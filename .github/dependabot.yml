version: 2
updates:
  # Python dependencies of the API kernel.
  - package-ecosystem: pip
    directory: /core
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  # GitHub Actions used by the CI/Release workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  # Base images referenced by the container Dockerfiles.
  - package-ecosystem: docker
    directory: /core
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: /web
    schedule:
      interval: weekly
