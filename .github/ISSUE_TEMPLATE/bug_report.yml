name: Fehlerbericht
description: Ein reproduzierbares Problem melden
title: "fix: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Danke für den Bericht! Bei **Sicherheitslücken** bitte **kein** Issue
        öffnen, sondern dem Prozess in [SECURITY.md](../blob/main/SECURITY.md)
        folgen.
  - type: textarea
    id: description
    attributes:
      label: Beschreibung
      description: Was ist passiert? Was hast du stattdessen erwartet?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Schritte zur Reproduktion
      description: Möglichst minimaler Ablauf, der den Fehler auslöst.
      placeholder: |
        1. …
        2. …
        3. Fehler tritt auf
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Umgebung
      description: Betroffene Komponente (z. B. `core`, `web`), Version/Commit, OS, Python-Version.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / Stacktrace
      render: shell
    validations:
      required: false
